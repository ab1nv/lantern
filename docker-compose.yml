services:
  frontend:
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - "8090:8090"
    volumes:
      - ./:/app
    environment:
      - GO_ENV=development
    command: ./client/entry.sh

  backend:
    container_name: lantern-backend
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./:/app
    working_dir: /app/cmd
    environment:
      - GO_ENV=development
    command: ["air", "-c", ".air.toml"]
